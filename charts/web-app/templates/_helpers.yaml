{{- define "name" -}}
{{- include "slugify" (.Values.name | default .Release.Name) -}}
{{- end }}

{{- define "slugify" -}}
{{- . | replace "/" "-" | replace "." "-" | lower -}}
{{- end }}

{{- define "hostnames.list" }}
{{- range . }}
{{- if kindIs "string" . }}
- {{ . }}
{{- else }}
{{- range $k, $v := . -}}
- {{ $k }}
{{- end }}
{{- end }}
{{- end }}
{{- end }}

{{- define "command" -}}
{{- if kindIs "slice" . -}}{{ toJson . }}
{{- else if kindIs "string" . -}}{{ toJson (list .) }}
{{- end -}}
{{- end }}
