suite: hpa
templates:
  - templates/hpa.yaml
tests:
  - it: should not render when hpa is false
    set:
      name: myapp
      image.repository: nginx
    asserts:
      - hasDocuments:
          count: 0

  - it: should render HPA when configured
    set:
      name: myapp
      image.repository: nginx
      hpa.replicas.min: 2
      hpa.replicas.max: 10
      hpa.cpuTarget: 80
      hpa.memoryTarget: 70
    asserts:
      - isKind:
          of: HorizontalPodAutoscaler
      - isAPIVersion:
          of: autoscaling/v2
      - equal:
          path: metadata.name
          value: web-app-myapp
      - equal:
          path: spec.minReplicas
          value: 2
      - equal:
          path: spec.maxReplicas
          value: 10

  - it: should target Deployment by default
    set:
      name: myapp
      image.repository: nginx
      hpa.replicas.min: 1
      hpa.replicas.max: 5
      hpa.cpuTarget: 80
      hpa.memoryTarget: 80
    asserts:
      - equal:
          path: spec.scaleTargetRef.kind
          value: Deployment
      - equal:
          path: spec.scaleTargetRef.apiVersion
          value: apps/v1

  - it: should target Rollout when strategy is canary
    set:
      name: myapp
      image.repository: nginx
      rollout.strategy: canary
      hpa.replicas.min: 1
      hpa.replicas.max: 5
      hpa.cpuTarget: 80
      hpa.memoryTarget: 80
    asserts:
      - equal:
          path: spec.scaleTargetRef.kind
          value: Rollout
      - equal:
          path: spec.scaleTargetRef.apiVersion
          value: argoproj.io/v1alpha1

  - it: should set CPU and memory utilization targets
    set:
      name: myapp
      image.repository: nginx
      hpa.replicas.min: 1
      hpa.replicas.max: 5
      hpa.cpuTarget: 75
      hpa.memoryTarget: 85
    asserts:
      - equal:
          path: spec.metrics[0].resource.target.averageUtilization
          value: 75
      - equal:
          path: spec.metrics[1].resource.target.averageUtilization
          value: 85
