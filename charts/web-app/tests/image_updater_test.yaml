suite: ImageUpdater CR
templates:
  - image-updater.yaml

tests:
  - it: should not render when autoUpdate is false
    set:
      name: myapp
      image.repository: nginx
    asserts:
      - hasDocuments:
          count: 0

  - it: should render an ImageUpdater CR when autoUpdate is true
    set:
      name: myapp
      image.repository: nginx
      image.autoUpdate: true
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: ImageUpdater
      - isAPIVersion:
          of: argocd-image-updater.argoproj.io/v1alpha1
      - equal:
          path: metadata.name
          value: myapp
      - equal:
          path: metadata.namespace
          value: argocd

  - it: should default applicationName to the app name
    set:
      name: myapp
      image.repository: nginx
      image.autoUpdate: true
    asserts:
      - equal:
          path: spec.applicationRefs[0].namePattern
          value: myapp

  - it: should use custom namespace when set
    set:
      name: myapp
      image.repository: nginx
      image.autoUpdate.argoNamespace: my-argo-ns
    asserts:
      - equal:
          path: metadata.namespace
          value: my-argo-ns

  - it: should set the image repository on the alias
    set:
      name: myapp
      image.repository: ghcr.io/my-org/my-app
      image.autoUpdate: true
    asserts:
      - equal:
          path: spec.applicationRefs[0].images[0].alias
          value: app
      - equal:
          path: spec.applicationRefs[0].images[0].imageName
          value: ghcr.io/my-org/my-app

  - it: should set helm manifestTargets to image.repository and image.tag
    set:
      name: myapp
      image.repository: nginx
      image.autoUpdate: true
    asserts:
      - equal:
          path: spec.applicationRefs[0].images[0].manifestTargets.helm.name
          value: image.repository
      - equal:
          path: spec.applicationRefs[0].images[0].manifestTargets.helm.tag
          value: image.tag

  - it: should default updateStrategy to digest
    set:
      name: myapp
      image.repository: nginx
      image.autoUpdate: true
    asserts:
      - equal:
          path: spec.applicationRefs[0].images[0].commonUpdateSettings.updateStrategy
          value: digest

  - it: should use custom updateStrategy when set
    set:
      name: myapp
      image.repository: nginx
      image.autoUpdate.strategy: semver
    asserts:
      - equal:
          path: spec.applicationRefs[0].images[0].commonUpdateSettings.updateStrategy
          value: semver

  - it: should set allowTags when configured
    set:
      name: myapp
      image.repository: nginx
      image.autoUpdate.allowTags: "regexp:^v[0-9]+\\.[0-9]+\\.[0-9]+$"
    asserts:
      - equal:
          path: spec.applicationRefs[0].images[0].commonUpdateSettings.allowTags
          value: "regexp:^v[0-9]+\\.[0-9]+\\.[0-9]+$"

  - it: should not set allowTags when not configured
    set:
      name: myapp
      image.repository: nginx
      image.autoUpdate: true
    asserts:
      - isNull:
          path: spec.applicationRefs[0].images[0].commonUpdateSettings.allowTags

  - it: should set ignoreTags when configured
    set:
      name: myapp
      image.repository: nginx
      image.autoUpdate.ignoreTags: "latest,dev"
    asserts:
      - equal:
          path: spec.applicationRefs[0].images[0].commonUpdateSettings.ignoreTags
          value: "latest,dev"

  - it: should not set ignoreTags when not configured
    set:
      name: myapp
      image.repository: nginx
      image.autoUpdate: true
    asserts:
      - isNull:
          path: spec.applicationRefs[0].images[0].commonUpdateSettings.ignoreTags

  - it: should set pullSecret from image.pullSecret
    set:
      name: myapp
      image.repository: nginx
      image.autoUpdate: true
      image.pullSecret: my-registry-secret
    asserts:
      - equal:
          path: spec.applicationRefs[0].images[0].commonUpdateSettings.pullSecret
          value: "pullsecret:NAMESPACE/my-registry-secret"

  - it: should not set pullSecret when not configured
    set:
      name: myapp
      image.repository: nginx
      image.autoUpdate: true
    asserts:
      - isNull:
          path: spec.applicationRefs[0].images[0].commonUpdateSettings.pullSecret
