suite: serviceaccount
templates:
  - templates/serviceaccount.yaml
tests:
  - it: should create the system-upgrade service account
    asserts:
      - isKind:
          of: ServiceAccount
      - isAPIVersion:
          of: v1
      - equal:
          path: metadata.name
          value: system-upgrade
      - equal:
          path: metadata.namespace
          value: system-upgrade
