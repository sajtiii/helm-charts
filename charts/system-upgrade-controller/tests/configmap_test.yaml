suite: configmap
templates:
  - templates/configmap.yaml
tests:
  - it: should create the default-controller-env configmap
    asserts:
      - isKind:
          of: ConfigMap
      - isAPIVersion:
          of: v1
      - equal:
          path: metadata.name
          value: default-controller-env
      - equal:
          path: metadata.namespace
          value: system-upgrade

  - it: should have debug disabled by default
    asserts:
      - equal:
          path: data.SYSTEM_UPGRADE_CONTROLLER_DEBUG
          value: "false"

  - it: should have leader election enabled by default
    asserts:
      - equal:
          path: data.SYSTEM_UPGRADE_CONTROLLER_LEADER_ELECT
          value: "true"

  - it: should default to 2 worker threads
    asserts:
      - equal:
          path: data.SYSTEM_UPGRADE_CONTROLLER_THREADS
          value: "2"
