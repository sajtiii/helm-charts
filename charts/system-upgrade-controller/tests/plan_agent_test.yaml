suite: plan-agent
templates:
  - templates/plan-agent.yaml
tests:
  - it: should create the agent-plan
    asserts:
      - isKind:
          of: Plan
      - isAPIVersion:
          of: upgrade.cattle.io/v1
      - equal:
          path: metadata.name
          value: agent-plan
      - equal:
          path: metadata.namespace
          value: system-upgrade

  - it: should target worker nodes (no control-plane label)
    asserts:
      - equal:
          path: spec.nodeSelector.matchExpressions[0].key
          value: node-role.kubernetes.io/control-plane
      - equal:
          path: spec.nodeSelector.matchExpressions[0].operator
          value: DoesNotExist

  - it: should include a prepare step by default
    asserts:
      - equal:
          path: spec.prepare.image
          value: rancher/k3s-upgrade
      - equal:
          path: spec.prepare.args
          value:
            - prepare
            - server-plan

  - it: should omit the prepare step when agentPrepare is false
    set:
      upgrade.agentPrepare: false
    asserts:
      - isNull:
          path: spec.prepare

  - it: should use the correct prepare image when using a custom upgrade image
    set:
      upgrade.image: rancher/rke2-upgrade
      upgrade.agentPrepare: true
    asserts:
      - equal:
          path: spec.prepare.image
          value: rancher/rke2-upgrade

  - it: should use channel by default
    asserts:
      - equal:
          path: spec.channel
          value: https://update.k3s.io/v1-release/channels/stable
      - isNull:
          path: spec.version

  - it: should use version when set and omit channel
    set:
      version: v1.32.2+k3s1
    asserts:
      - equal:
          path: spec.version
          value: v1.32.2+k3s1
      - isNull:
          path: spec.channel

  - it: should use the default k3s upgrade image
    asserts:
      - equal:
          path: spec.upgrade.image
          value: rancher/k3s-upgrade

  - it: should use a custom upgrade image for RKE2
    set:
      upgrade.image: rancher/rke2-upgrade
    asserts:
      - equal:
          path: spec.upgrade.image
          value: rancher/rke2-upgrade

  - it: should set concurrency from values
    set:
      upgrade.concurrency: 2
    asserts:
      - equal:
          path: spec.concurrency
          value: 2

  - it: should use the system-upgrade service account
    asserts:
      - equal:
          path: spec.serviceAccountName
          value: system-upgrade

  - it: should set the maintenance window
    asserts:
      - equal:
          path: spec.window.startTime
          value: "04:00"
      - equal:
          path: spec.window.endTime
          value: "05:00"
      - equal:
          path: spec.window.timeZone
          value: UTC
